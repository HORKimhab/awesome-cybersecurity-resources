name: Discover Resources

on:
  schedule:
    # GitHub may delay or drop jobs scheduled at the top of the hour.
    # Run hourly at minute 22 UTC to reduce contention.
    - cron: "22 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Discover new resources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/discover_resources.py

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add awesome-cybersecurity-resources.md data/automation/state.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh discovered cybersecurity resources"
          git push
